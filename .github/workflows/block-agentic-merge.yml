name: Block agentic → main merge

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  check-base:
    runs-on: ubuntu-latest
    if: github.head_ref == 'agentic'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check release/v4.0 branch exists
        run: |
          if git ls-remote --heads origin release/v4.0 | grep release/v4.0; then
            echo "✅ release/v4.0 exists — proceeding."
          else
            echo "❌ release/v4.0 does not exist."
            echo ""
            echo "Merge blocked: v4.0 must be moved from main to release/v4.0"
            echo "before any agentic → main merge is allowed."
            echo ""
            echo "Run these commands first:"
            echo "  git checkout main"
            echo "  git checkout -b release/v4.0"
            echo "  git push origin release/v4.0"
            exit 1
          fi

      - name: Check main still points at v4.0 (not agentic)
        run: |
          MAIN_HASH=$(git rev-parse origin/main)
          RELEASE_HASH=$(git rev-parse origin/release/v4.0)
          if [ "$MAIN_HASH" != "$RELEASE_HASH" ]; then
            echo "❌ main ($(echo $MAIN_HASH | head -c 8)) does not match"
            echo "   release/v4.0 ($(echo $RELEASE_HASH | head -c 8))."
            echo ""
            echo "Merge blocked: main must point at release/v4.0 before"
            echo "agentic can be merged. Run:"
            echo "  git push origin origin/main:release/v4.0"
            echo "  (if release/v4.0 already exists and points at v4.0)"
            exit 1
          fi
          echo "✅ main matches release/v4.0 — safe to merge."
