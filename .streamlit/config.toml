[theme]
# Base theme
base = "dark"

# Primary Accent (Muted Indigo/Blue) - Affects checkboxes, tags, and primary buttons
primaryColor = "#5c6bc0"

# Main App Background (Dark Charcoal)
backgroundColor = "#1e1e24"

# Sidebar and Chat Bubble Background (Slightly lighter Charcoal)
secondaryBackgroundColor = "#2b2d35"

# Text Color (Off-white for readability)
textColor = "#e0e0e0"
