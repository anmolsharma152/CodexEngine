services:
  - type: web
    name: codex-backend
    env: docker
    rootDir: codex-backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DB_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*" # Update this to your Vercel frontend URL once deployed
