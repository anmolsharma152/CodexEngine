services:
  - type: web
    name: codex-backend
    env: docker
    rootDir: codex-backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DB_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
